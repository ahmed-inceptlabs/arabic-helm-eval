version: 2

# System prompt used for synthetic data generation / fine-tuning examples.
system_prompt: >
  أجب بالعربية الفصحى فقط.
  التزم بالتعليمات الخاصة بكل قالب كما هي.
  إذا طُلب إخراج JSON فأعد JSON صحيحًا فقط دون أي نص إضافي.
  لا تضف شروحًا، ولا ملاحظات، ولا تنسيقات Markdown، ولا أسوار كود.
  لا تنتج أي مفاتيح JSON غير المطلوبة.
  احرص على أن تكون الأمثلة سليمة نحويًا وإملائيًا، وواضحة، وغير ملتبسة.
  تجنب المسائل الخلافية، والأمثلة التي تحتمل أكثر من وجه صحيح، إلا إذا طُلب ذلك صراحة.

generation_policy:
  domain: >
    توليد بيانات تعليمية في النحو والصرف العربيين، مستلهمة من الأسلوب التعليمي
    المدرسي الواضح، مع تركيز على القواعد المشهورة والأمثلة غير الملتبسة.
  audience: >
    متعلم العربية في المسارات التأسيسية والمتوسطة، مع تدرج مضبوط في الصعوبة.
  style_rules:
    - استخدم العربية الفصحى فقط.
    - اجعل الصياغة واضحة ومباشرة وتعليمية.
    - تجنب العامية والتكلف الأدبي غير الضروري.
    - تجنب الجمل الطويلة جدًا.
    - استخدم أمثلة طبيعية وسهلة الفهم.
    - تجنب الألفاظ النادرة إلا عند الحاجة التعليمية الواضحة.
    - لا تكرر المثال نفسه أو البنية نفسها بكثرة.
  correctness_rules:
    - التزم بالقواعد النحوية والصرفية المشهورة المعتمدة في التعليم.
    - تجنب المسائل الخلافية بين النحاة.
    - تجنب الجمل التي تسمح بأكثر من تحليل صحيح إذا كان المطلوب اختيار إجابة واحدة.
    - اجعل الإجابة الصحيحة واحدة فقط عند إنشاء أسئلة الاختيار من متعدد.
    - تأكد من سلامة علامات الترقيم والإملاء.
  json_rules:
    - أخرج JSON صالحًا فقط.
    - لا تضف أي نص قبل JSON أو بعده.
    - لا تستخدم trailing commas.
    - لا تضع تعليقات داخل JSON.
    - لا تضع الحقول إلا بالصيغة المطلوبة تمامًا.

difficulty_rules:
  مبتدئ:
    description: >
      سؤال مباشر أو حوار قصير حول قاعدة أساسية واحدة، مع مثال واضح غير ملتبس،
      ودون استثناءات أو تراكيب معقدة.
    constraints:
      - استخدم جملة قصيرة أو متوسطة.
      - لا تجمع أكثر من مهارة في السؤال نفسه.
      - اجعل الفرق بين الخيارات قائمًا على القاعدة الأساسية مباشرة.
  متوسط:
    description: >
      يتطلب التمييز بين قاعدتين متقاربتين أو تطبيق القاعدة على جملة أطول قليلًا،
      مع بقاء المثال واضحًا وغير خادع.
    constraints:
      - يمكن استخدام جملة أطول أو مثالين قصيرين عند الحاجة.
      - يمكن إدخال ناسخ أو مفعول أو علامة فرعية بصورة واضحة.
      - تجنب التعقيد الذي يحول السؤال إلى مستوى متقدم.
  متقدم:
    description: >
      يتطلب تحليلًا أدق لتركيب نحوي أو صرفي، أو التمييز بين أوزان أو مشتقات
      أو حالات إعلال وإبدال، مع بقاء الإجابة قابلة للحسم.
    constraints:
      - يمكن إدخال تركيب مركب أو وزن صرفي أدق.
      - يمكن استخدام مشتقات أو أبواب صرفية أعمق.
      - يجب أن تبقى الإجابة واحدة وغير قابلة للالتباس.

topics:
  - name: النحو_الأساسي
    difficulty: مبتدئ
    focus:
      - الإعراب الأساسي
      - المبتدأ والخبر
      - الجملة الاسمية
      - الجملة الفعلية

  - name: الصرف_الأساسي
    difficulty: مبتدئ
    focus:
      - الميزان الصرفي
      - تصريف الفعل الماضي
      - تصريف الفعل المضارع
      - تصريف فعل الأمر

  - name: الإعراب_المتوسط
    difficulty: متوسط
    focus:
      - النواسخ
      - الأفعال الخمسة
      - المفاعيل
      - التمييز

  - name: الصرف_المتقدم
    difficulty: متقدم
    focus:
      - الإعلال والإبدال
      - الأوزان المزيدة
      - المشتقات

  - name: علامات_الإعراب
    difficulty: متوسط
    focus:
      - العلامات الأصلية
      - العلامات الفرعية
      - المثنى
      - جمع المذكر السالم
      - جمع المؤنث السالم
      - الأسماء الخمسة

  - name: الأساليب
    difficulty: متوسط
    focus:
      - الشرط
      - الاستثناء
      - النداء
      - التوكيد

task_types:
  - mcq_generation
  - dialogue_generation

templates:
  mcq_prompt: |
    أنت مولد بيانات تعليمية متخصص في النحو والصرف العربيين.

    المهمة:
    أنشئ سؤال اختيار من متعدد واحدًا فقط عن الموضوع: "{topic}"
    بالمستوى: "{difficulty}"
    المحاور الفرعية: {focus}

    الهدف:
    قياس فهم المتعلم لقاعدة واحدة محددة بوضوح، دون لبس أو خلاف.

    الشروط العامة:
    - أخرج JSON فقط.
    - أنشئ سؤالًا واحدًا فقط.
    - استخدم العربية الفصحى فقط.
    - اجعل السؤال سليمًا نحويًا وإملائيًا.
    - اجعل الإجابة الصحيحة واحدة فقط.
    - لا تجعل السؤال معتمدًا على التخمين.
    - لا تستخدم أمثلة تحتمل أكثر من وجه صحيح.
    - لا تستخدم "جميع ما سبق" أو "لا شيء مما سبق".
    - لا تجعل الخيار الصحيح مكشوفًا بطوله أو وضوحه مقارنة ببقية الخيارات.
    - لا تكرر ألفاظ السؤال حرفيًا داخل الخيار الصحيح بطريقة تكشفه.

    شروط بناء السؤال:
    - يجب أن يختبر السؤال قاعدة واحدة فقط.
    - يجب أن تكون صياغة السؤال مباشرة وواضحة.
    - يمكن أن يكون السؤال عن:
      1) تعيين الإعراب
      2) اختيار الصيغة الصحيحة
      3) تحديد الوزن
      4) تعيين العلامة الإعرابية
      5) تمييز الأسلوب أو الوظيفة النحوية
    - اختر النمط الأنسب للموضوع ومستوى الصعوبة.

    شروط الخيارات:
    - أنشئ أربع خيارات فقط بعلامات عربية: أ، ب، ج، د.
    - يجب أن تكون جميع الخيارات من النوع نفسه.
      مثال:
      - كلها مصطلحات نحوية
      - أو كلها صيغ صرفية
      - أو كلها علامات إعراب
    - اجعل المشتتات معقولة وقريبة من الخطأ الشائع.
    - تجنب المشتتات السخيفة أو المستحيلة.
    - لا تجعل أكثر من خيار صحيحًا جزئيًا.

    ضبط الصعوبة:
    - إذا كان المستوى "مبتدئ": اجعل السؤال مباشرًا بجملة واضحة قصيرة أو متوسطة.
    - إذا كان المستوى "متوسط": اسمح بحاجة بسيطة إلى التمييز بين قاعدتين متقاربتين.
    - إذا كان المستوى "متقدم": اجعل التحليل أدق، لكن أبق الإجابة قابلة للحسم بلا لبس.

    أعد الناتج في JSON فقط بهذه الحقول تمامًا:
    {
      "question": "...",
      "options": {
        "أ": "...",
        "ب": "...",
        "ج": "...",
        "د": "..."
      },
      "answer": "أ"
    }

  dialogue_prompt: |
    أنت مولد بيانات تعليمية متخصص في النحو والصرف العربيين.

    المهمة:
    أنشئ حوارًا تعليميًا قصيرًا من 2 إلى 3 أدوار عن الموضوع: "{topic}"
    بالمستوى: "{difficulty}"
    المحاور الفرعية: {focus}

    الهدف:
    توضيح قاعدة نحوية أو صرفية واحدة فقط من خلال تفاعل قصير وواضح
    ينتهي بإجابة موجزة وتعليمية.

    الشروط العامة:
    - أخرج JSON فقط.
    - استخدم العربية الفصحى فقط.
    - اجعل الحوار قصيرًا وواضحًا وطبيعيًا.
    - ركز على قاعدة واحدة فقط.
    - تجنب الحشو والمقدمات الطويلة.
    - اجعل جواب المساعد موجزًا ودقيقًا.
    - تجنب الخلافات النحوية والأمثلة الملتبسة.
    - اجعل المثال المستخدم واضحًا ومناسبًا للمستوى.

    شروط بناء الحوار:
    - يبدأ الحوار بسؤال تعليمي واضح من المتعلم أو بطلب توضيح قصير.
    - يجيب المساعد بجواب يشرح القاعدة بإيجاز.
    - يمكن أن يتضمن الحوار خطأ شائعًا واحدًا أو لبسًا واحدًا فقط ثم تصحيحه.
    - إذا كان الحوار من 3 أدوار، فيكون التسلسل:
      1) سؤال
      2) توضيح أو تصحيح
      3) جواب ختامي موجز
    - لا تجعل الحوار وعظيًا أو إنشائيًا.
    - لا تتوسع في أكثر من نقطة.

    ضبط الصعوبة:
    - إذا كان المستوى "مبتدئ": استخدم مثالًا مباشرًا وقاعدة أساسية.
    - إذا كان المستوى "متوسط": اسمح بلبس بسيط يحتاج إلى تمييز.
    - إذا كان المستوى "متقدم": اجعل النقطة أدق، مع الحفاظ على الوضوح.

    أعد الناتج في JSON فقط بهذه الحقول تمامًا:
    {
      "messages": [
        {"role": "user", "content": "..."},
        {"role": "assistant", "content": "..."}
      ]
    }

optional_extensions:
  validation_checklist:
    - هل الناتج بالعربية الفصحى فقط؟
    - هل JSON صالح تمامًا؟
    - هل التزم الحقول المطلوبة فقط؟
    - هل يوجد سؤال واحد فقط في حالة الاختيار من متعدد؟
    - هل توجد أربعة خيارات فقط: أ، ب، ج، د؟
    - هل الإجابة الصحيحة واحدة فقط؟
    - هل المشتتات معقولة وغير سخيفة؟
    - هل المثال واضح وغير ملتبس؟
    - هل الصعوبة مناسبة للمستوى المطلوب؟
    - هل القاعدة المختبرة واحدة فقط؟

usage_examples:
